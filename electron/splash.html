<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bester.Builds</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f11;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Subtle radial glow behind the logo */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 45%, rgba(124, 58, 237, 0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 0;
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo mark — purple square with printer icon */
    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(124, 58, 237, 0.3),
        0 8px 32px rgba(124, 58, 237, 0.35),
        0 2px 8px rgba(0, 0, 0, 0.4);
      margin-bottom: 20px;
      animation: logoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .logo-mark svg {
      width: 38px;
      height: 38px;
      color: white;
    }

    /* App name */
    .app-name {
      font-size: 26px;
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      animation: textIn 0.5s ease-out 0.2s both;
    }

    .app-name span {
      color: #a78bfa;
    }

    /* Tagline */
    .tagline {
      font-size: 12px;
      color: #71717a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 40px;
      animation: textIn 0.5s ease-out 0.25s both;
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Progress bar track */
    .progress-track {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
      animation: textIn 0.4s ease-out 0.35s both;
    }

    /* Animated progress fill */
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 99px;
      animation: progressAnim 3.5s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards;
    }

    @keyframes progressAnim {
      0%   { width: 0%; }
      20%  { width: 25%; }
      45%  { width: 55%; }
      70%  { width: 75%; }
      90%  { width: 88%; }
      100% { width: 95%; }
    }

    /* Status text */
    .status {
      font-size: 11px;
      color: #52525b;
      letter-spacing: 0.04em;
      animation: textIn 0.4s ease-out 0.4s both;
      min-height: 16px;
    }

    /* Version badge */
    .version {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 10px;
      color: #3f3f46;
      letter-spacing: 0.05em;
    }

    /* Fade-out class applied by main process before closing */
    .fade-out {
      animation: fadeOut 0.35s ease-in forwards !important;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <!-- Logo mark with printer SVG -->
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/>
        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
    </div>

    <!-- App name -->
    <div class="app-name">Bester<span>.Builds</span></div>

    <!-- Tagline -->
    <div class="tagline">Business Automation Platform</div>

    <!-- Progress bar -->
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Status text — cycles through startup messages -->
    <div class="status" id="status">Starting services…</div>
  </div>

  <!-- Version injected by main process via query param -->
  <div class="version" id="version"></div>

  <script>
    // Cycle through startup status messages
    const messages = [
      "Starting services…",
      "Loading database…",
      "Initialising modules…",
      "Almost ready…",
    ];
    let idx = 0;
    const statusEl = document.getElementById("status");
    const versionEl = document.getElementById("version");

    // Show version from query string if provided
    const params = new URLSearchParams(window.location.search);
    const ver = params.get("v");
    if (ver) versionEl.textContent = `v${ver}`;

    // Rotate status messages
    const interval = setInterval(() => {
      idx = (idx + 1) % messages.length;
      statusEl.style.opacity = "0";
      setTimeout(() => {
        statusEl.textContent = messages[idx];
        statusEl.style.transition = "opacity 0.3s";
        statusEl.style.opacity = "1";
      }, 150);
    }, 900);

    // Listen for close signal from main process
    window.addEventListener("message", (e) => {
      if (e.data === "close") {
        clearInterval(interval);
        statusEl.textContent = "Ready!";
        document.getElementById("progressFill").style.animation = "none";
        document.getElementById("progressFill").style.width = "100%";
        document.getElementById("progressFill").style.transition = "width 0.2s ease-out";
        setTimeout(() => {
          document.getElementById("container").classList.add("fade-out");
        }, 250);
      }
    });
  </script>
</body>
</html>
