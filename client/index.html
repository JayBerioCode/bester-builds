<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Bester.Builds — Business Automation Platform</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour (browser chrome on Android) -->
    <meta name="theme-color" content="#1e1730" />
    <meta name="msapplication-TileColor" content="#1e1730" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bester.Builds" />
    <link
      rel="apple-touch-icon"
      href="https://d2xsxph8kpxj0f.cloudfront.net/310419663032076352/WwME9AmZKtjnw8sLvcXv7V/bb-icon-512-AEbYtCkQnY3iPFZfyvHakN.png" />

    <!-- SEO / Open Graph -->
    <meta name="description" content="Business automation platform for print shops — invoices, job cards, payroll, inventory, and more." />
    <meta property="og:title" content="Bester.Builds" />
    <meta property="og:description" content="Business automation platform for print shops." />
    <meta property="og:type" content="website" />

    <!-- Prevent phone number detection on iOS -->
    <meta name="format-detection" content="telephone=no" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
